<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ask Brian — ChatterTuber</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #080f1e;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .form-card {
            background: #0a1525;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 48px;
            max-width: 480px;
            width: 100%;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 8px;
        }
        .subtitle {
            opacity: 0.6;
            margin-bottom: 32px;
        }
        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 8px;
            opacity: 0.8;
        }
        input, textarea {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 12px 16px;
            color: white;
            font-family: 'Inter', sans-serif;
            margin-bottom: 20px;
        }
        textarea { min-height: 100px; resize: vertical; }
        button {
            width: 100%;
            background: #2563eb;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="form-card">
        <h1>Ask Brian</h1>
        <p class="subtitle">Got a question? Send us a message and we'll get back to you.</p>
        <form>
            <label>Name</label>
            <input type="text" required>
            <label>Phone</label>
            <input type="tel" required>
            <label>Email</label>
            <input type="email" required>
            <label>Message</label>
            <textarea required></textarea>
            <button type="submit">Send Message</button>
        </form>
    </div>
</body>
</html>
