<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatterTuber — The Local Guide That Speaks Your Language</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #080f1e;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        .navbar {
            background-color: rgba(8, 15, 30, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.07);
            padding: 18px 0;
            transition: all 0.3s ease;
        }
        .navbar-brand {
            color: #ffffff;
            font-weight: 800;
            font-size: 1.3rem;
            letter-spacing: -0.5px;
        }
        .nav-link {
            color: rgba(255,255,255,0.7) !important;
            margin-left: 32px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
        }
        .nav-link:hover { color: #ffffff !important; }
        .btn-ask {
            background: #2563eb;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            margin-left: 24px;
            transition: background 0.2s;
        }
        .btn-ask:hover { background: #1d4ed8; color: white; }
        #hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 140px 24px 100px;
            position: relative;
            background: radial-gradient(ellipse at 55% 1%, rgba(39, 95, 225, 0.15) 0%, transparent 70%);
        }
        .hero-tag {
            display: inline-block;
            background: rgba(37, 99, 235, 0.15);
            border: 1px solid rgba(37, 99, 235, 0.4);
            color: #60a5fa;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 6px 16px;
            border-radius: 100px;
            margin-bottom: 32px;
        }
        #hero h1 {
            font-size: clamp(2.8rem, 6vw, 5rem);
            font-weight: 900;
            line-height: 1.05;
            letter-spacing: -2px;
            margin-bottom: 24px;
            max-width: 900px;
        }
        #hero h1 span { color: #2563eb; }
        #hero p {
            font-size: 1.25rem;
            opacity: 0.6;
            max-width: 580px;
            line-height: 1.7;
            margin-bottom: 48px;
        }
        .hero-cta {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn-primary-hero {
            background: #2563eb;
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1rem;
            text-decoration: none;
            transition: all 0.2s;
        }
        .btn-primary-hero:hover {
            background: #1d4ed8;
            color: white;
            transform: translateY(-1px);
        }
        .btn-secondary-hero {
            background: rgba(255,255,255,0.06);
            color: white;
            border: 1px solid rgba(255,255,255,0.12);
            padding: 14px 32px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1rem;
            text-decoration: none;
            transition: all 0.2s;
        }
        .btn-secondary-hero:hover {
            background: rgba(255,255,255,0.1);
            color: white;
        }
        section { padding: 120px 0; }
        .section-tag {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #2563eb;
            margin-bottom: 16px;
        }
        .section-title {
            font-size: clamp(2rem, 4vw, 3rem);
            font-weight: 800;
            letter-spacing: -1px;
            line-height: 1.1;
            margin-bottom: 24px;
        }
        .section-body {
            font-size: 1.1rem;
            opacity: 0.65;
            max-width: 580px;
            line-height: 1.8;
        }
        #problem { background-color: #080f1e; }
        #solution { background-color: #0a1525; }
        #audiences { background-color: #080f1e; }
        #built { background-color: #0a1525; }
        .section-divider {
            width: 48px;
            height: 3px;
            background: #2563eb;
            border-radius: 2px;
            margin-bottom: 32px;
        }
        .fade-up {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.7s ease, transform 0.7s ease;
        }
        .fade-up.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .signup-float {
            position: fixed;
            bottom: 32px;
            right: 32px;
            background: #2563eb;
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.95rem;
            text-decoration: none;
            box-shadow: 0 8px 32px rgba(37, 99, 235, 0.4);
            z-index: 999;
            transition: all 0.2s;
        }
        .signup-float:hover {
            background: #1d4ed8;
            color: white;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div id="navbar"></div>
    <div id="hero"></div>
    <div id="problem"></div>
    <div id="solution"></div>
    <div id="audiences"></div>
    <div id="built"></div>

    <a href="#signup" class="signup-float">Register Interest →</a>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const views = ['navbar', 'hero', 'problem', 'solution', 'audiences', 'built'];
        views.forEach(view => {
            fetch(`views/${view}.html`)
                .then(res => res.text())
                .then(html => {
                    document.getElementById(view).innerHTML = html;
                });
        });

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, { threshold: 0.15 });

        setTimeout(() => {
            document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));
        }, 500);
    </script>
</body>
</html>
